kind = "web"
previewPath = "/"
title = "Export Intelligence Hub"
version = "1.0.0"
id = "artifacts/export-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18383

[services.development]
run = "pnpm --filter @workspace/export-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/export-hub", "run", "build" ]
publicDir = "artifacts/export-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18383"
BASE_PATH = "/"
